# Core application identity
spring.application.name=data-hub

# Copy this file to:
# data-hub/config/application.properties
# and fill in your local credentials.

# MQTT
datahub.mqtt.uri=tcp://127.0.0.1:1883
datahub.mqtt.client-id=java-data-hub-v1
datahub.mqtt.username=
datahub.mqtt.password=
datahub.mqtt.qos=1
datahub.mqtt.max-inflight=128
datahub.mqtt.log-each-message=true
datahub.mqtt.connect-timeout-seconds=10
datahub.mqtt.keep-alive-seconds=30
datahub.buffer-size=2048
datahub.processing-concurrency=8
datahub.processing.parser-concurrency=8
datahub.processing.writer-concurrency=8
datahub.processing.prefetch=256
datahub.backpressure.source-queue-size=2048
datahub.backpressure.pipeline-buffer-size=4096
datahub.backpressure.overflow-strategy=drop_oldest
datahub.backpressure.overflow-log-every=100

# Telemetry filtering
datahub.telemetry-filter.enabled=true
datahub.telemetry-filter.log-skips=false
datahub.telemetry-filter.heartbeat-interval-ms=30000
datahub.telemetry-filter.state-ttl-ms=900000
datahub.telemetry-filter.max-active-devices=100000
datahub.telemetry-filter.target-temp-deadband=0.05
datahub.telemetry-filter.sim-temp-deadband=0.05
datahub.telemetry-filter.sensor-temp-deadband=0.05
datahub.telemetry-filter.error-deadband=0.02
datahub.telemetry-filter.integral-error-deadband=1.0
datahub.telemetry-filter.control-output-deadband=1.0
datahub.telemetry-filter.pwm-duty-deadband=1
datahub.telemetry-filter.pwm-norm-deadband=0.01
datahub.telemetry-filter.parameter-deadband=0.01
datahub.telemetry-summary.enabled=true
datahub.telemetry-summary.min-samples=3
datahub.telemetry-summary.idle-flush-interval-ms=45000
datahub.telemetry-summary.idle-flush-check-ms=10000
datahub.telemetry-summary.window-ttl-ms=120000
datahub.telemetry-summary.max-active-windows=100000

# Device online/offline tracking
datahub.device-status.enabled=true
datahub.device-status.online-timeout-ms=60000
datahub.device-status.offline-check-ms=10000
datahub.device-status.state-ttl-ms=86400000
datahub.device-status.max-active-devices=100000

# Redis cache for alarms (active state, rules cache, fsm state)
datahub.redis.enabled=false
datahub.redis.host=127.0.0.1
datahub.redis.port=6379
datahub.redis.password=
datahub.redis.database=0
datahub.redis.connect-timeout-ms=2000
datahub.redis.alarm-key-prefix=datahub:alarm
datahub.redis.active-ttl-seconds=172800
datahub.redis.rules-ttl-seconds=172800
datahub.redis.fsm-ttl-seconds=172800

# Storage
# log: log only
# file: JSONL archive
# tdengine-rest: write into TDengine REST SQL endpoint
datahub.storage.mode=log
datahub.storage.base-dir=runtime/data-hub
datahub.storage.tdengine.url=http://127.0.0.1:6041
datahub.storage.tdengine.database=edgehub
datahub.storage.tdengine.username=root
datahub.storage.tdengine.password=taosdata
datahub.storage.tdengine.auto-create=true
datahub.storage.tdengine.log-each-write=true
datahub.storage.tdengine.telemetry-batch-enabled=true
datahub.storage.tdengine.telemetry-batch-max-rows=50
datahub.storage.tdengine.telemetry-batch-max-delay-ms=500
datahub.storage.tdengine.connect-timeout-seconds=5
datahub.storage.tdengine.request-timeout-seconds=10

# Logging
datahub.logging.level.root=warn
datahub.logging.level.app=info
datahub.logging.level.spring=warn
datahub.logging.level.mqtt=warn
datahub.logging.dir=runtime/logs
datahub.logging.file-name=${spring.application.name}.log
datahub.logging.archive-dir=${datahub.logging.dir}/archive
datahub.logging.rolling.file-pattern=${datahub.logging.archive-dir}/${spring.application.name}-%d{yyyy-MM-dd}-%i.log.gz
datahub.logging.rolling.max-file-size=20MB
datahub.logging.rolling.retention-days=30
datahub.logging.rolling.total-size-cap=2GB

# Monitoring
datahub.monitoring.stats-log-enabled=true
datahub.monitoring.stats-log-interval-ms=30000
